<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scheduler</title>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
        }
        /* Global page styling for a clean, modern layout. */
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        /* Main container for the scheduler interface. */
        .app-card {
            background: #ffffff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 520px;
        }
        h1 { margin: 0 0 24px 0; font-size: 26px; color: #1e293b; display: flex; align-items: center; gap: 10px; }
        /* Form layout for task input and scheduling controls. */
        .form-layout { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        input[type="text"], input[type="datetime-local"] {
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        .status-message {
            display: none;
            margin: 0 0 16px 0;
            font-size: 14px;
            font-weight: 600;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15); }
        .submit-btn {
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover { background: #4338ca; }
        /* Styles for the task list and each task item. */
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f8fafc;
            margin-bottom: 12px;
            border-radius: 10px;
            border-left: 5px solid #cbd5e1;
            transition: all 0.2s;
        }
        li.completed { border-left-color: var(--success); background: #f0fdf4; }
        li.completed .text { text-decoration: line-through; color: #64748b; }
        .task-meta { display: flex; flex-direction: column; gap: 4px; }
        .time-badge { font-size: 12px; color: #64748b; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; width: fit-content; }
        .actions { display: flex; gap: 8px; }
        .action-btn {
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            transition: opacity 0.2s;
        }
        .action-btn:hover { opacity: 0.9; }
        .btn-done { background: var(--success); }
        .btn-del { background: var(--danger); }

        /* Alarm popup styling for deadline reminders. */
        .alarm-modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .alarm-modal.active {
            visibility: visible;
            opacity: 1;
        }
        .alarm-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            max-width: 400px;
            width: 90%;
            animation: pulse-border 1s infinite alternate;
        }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.5); }
            100% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
        }
        .alarm-box h2 { color: var(--danger); margin: 0 0 10px; font-size: 28px; }
        .alarm-box p { color: #475569; font-size: 18px; margin: 0 0 24px; font-weight: 500; }
        .dismiss-btn {
            width: 100%;
            padding: 14px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .dismiss-btn:hover { background: #b91c1c; }
    </style>
</head>
<body>

    <!-- Main scheduler interface -->
    <div class="app-card">
        <h1 style="display: flex; justify-content: center; align-items: center; gap: 10px;">
            <span>⚡</span> Smart Scheduler
        </h1>
        <form class="form-layout" onsubmit="addTask(event)">
            <input id="taskInput" type="text" placeholder="What needs to be scheduled?">
            <input id="timeInput" type="datetime-local">
            <button class="submit-btn" type="submit">Schedule Task</button>
        </form>
        <p id="statusMessage" class="status-message" aria-live="polite"></p>
        <ul id="taskList"></ul>
    </div>

    <!-- Active Device Alarm Overlay View Components -->
    <div id="alarmModal" class="alarm-modal">
        <div class="alarm-box">
            <h2>⏰ ALARM ACTIVE</h2>
            <p id="alarmTaskText">Loading scheduled alert description...</p>
            <button class="dismiss-btn" onclick="stopAlarmHardwareEngine()">Dismiss Alarm</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
